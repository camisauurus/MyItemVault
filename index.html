<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyItemVault — Inventario Personal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>🎒 MyItemVault</h1>
        <p class="subtitle">Inventario personal</p>
      </div>
      <nav id="category-nav">
        <button id="cat-all" class="cat-item active" data-cat-id="">
          <span class="cat-icon">🏠</span>
          <span class="cat-name">Todas</span>
          <span class="cat-count">0</span>
        </button>
        <div id="category-list"></div>
        <button id="btn-add-category" class="cat-item add">
          <span class="cat-icon">➕</span>
          <span class="cat-name">Nueva Categoría</span>
        </button>
      </nav>
      <div id="stats-panel"></div>
      <div id="settings-panel" class="hidden">
        <button id="btn-load-sample" class="btn-sidebar">📦 Cargar Demo</button>
        <button id="btn-export" class="btn-sidebar">📤 Exportar a Excel</button>
        <button id="btn-reset" class="btn-sidebar danger">🗑️ Reset</button>
      </div>
      <div class="sidebar-footer">
        <button id="btn-settings" class="btn-sidebar settings-btn">⚙️ Configuración</button>
      </div>
    </aside>
    <main id="main">
      <header id="main-header">
        <div class="view-title-row">
          <h2 id="view-title">📋 Todas las Categorías</h2>
          <div id="category-actions" class="hidden">
            <button id="btn-edit-category" class="btn-icon-sm" title="Editar categoría">✏️</button>
            <button id="btn-delete-category" class="btn-icon-sm" title="Eliminar categoría">🗑️</button>
          </div>
        </div>
        <div class="toolbar">
          <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 Buscar item..." autocomplete="off">
          </div>
          <select id="rarity-filter">
            <option value="">✨ Todas las rarezas</option>
            <option value="common">⚪ Común</option>
            <option value="uncommon">🟢 Poco Común</option>
            <option value="rare">🔵 Raro</option>
            <option value="epic">🟣 Épico</option>
            <option value="legendary">🟠 Legendario</option>
          </select>
          <button id="btn-add-item" class="btn-primary">➕ Añadir Item</button>
        </div>
      </header>
      <div id="grid"></div>
      <div id="empty-state" class="hidden">
        <div class="empty-icon">🎒</div>
        <p class="empty-title">¡El inventario está vacío!</p>
        <p class="empty-desc">Añade tu primer item al inventario.</p>
        <button id="btn-empty-add" class="btn-primary">➕ Añadir Item</button>
      </div>
    </main>
  </div>
  <div id="detail-overlay" class="hidden">
    <div id="detail-modal">
      <div style="padding:16px 20px;display:flex;justify-content:flex-end;border-bottom:1px solid var(--border)">
        <button id="detail-close" class="modal-x">✕</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div class="modal-header">
        <h3 id="modal-title">➕ Nuevo Item</h3>
        <button id="modal-close" class="modal-x">✕</button>
      </div>
      <form id="item-form">
        <label class="form-field">
          <span>Nombre del item</span>
          <input type="text" id="f-name" required placeholder="Ej: Laptop UltraPro">
        </label>
        <div class="form-row">
          <label class="form-field">
            <span>Categoría</span>
            <select id="f-category" required></select>
          </label>
          <label class="form-field">
            <span>Rareza</span>
            <select id="f-rarity" required>
              <option value="common">⚪ Común</option>
              <option value="uncommon">🟢 Poco Común</option>
              <option value="rare">🔵 Raro</option>
              <option value="epic">🟣 Épico</option>
              <option value="legendary">🟠 Legendario</option>
            </select>
          </label>
        </div>
        <div class="form-row">
          <label class="form-field">
            <span>Cantidad</span>
            <input type="number" id="f-quantity" value="1" min="1" required>
          </label>
          <div class="form-field form-field-price">
            <span>Precio</span>
            <div class="price-input-group">
              <input type="number" id="f-price" step="0.01" min="0" placeholder="0.00">
              <select id="f-currency">
                <option value="CLP">$ CLP</option>
                <option value="USD">US$ USD</option>
              </select>
            </div>
          </div>
        </div>
        <label class="form-field">
          <span>Adquirido en</span>
          <input type="text" id="f-acquired-from" placeholder="Ej: Amazon, MercadoLibre, Tienda física...">
        </label>
        <label class="form-field">
          <span>Fecha de adquisición</span>
          <div class="date-input-group">
            <input type="date" id="f-date">
            <button type="button" id="btn-date-picker" class="btn-date-trigger" title="Abrir calendario">📅</button>
          </div>
        </label>
        <label class="form-field">
          <span>Descripción</span>
          <textarea id="f-description" rows="3" placeholder="Describe tu item..."></textarea>
        </label>
        <label class="form-field">
          <span>URL de imagen (opcional)</span>
          <input type="url" id="f-image" placeholder="https://ejemplo.com/imagen.png">
        </label>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn-secondary">Cancelar</button>
          <button type="submit" id="modal-save" class="btn-primary">💾 Guardar</button>
        </div>
      </form>
    </div>
  </div>
  <script src="js/store.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/sample-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
